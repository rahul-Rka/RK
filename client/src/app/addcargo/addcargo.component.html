<div class="container mt-4" style="max-width: 600px;">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Add New Cargo</h2>
    <button class="btn btn-outline-secondary" (click)="goBack()">← Back</button>
  </div>

  <div class="card p-4 shadow">
    <form [formGroup]="itemForm" (ngSubmit)="submit()">

      <div class="mb-3">
        <label class="form-label">Content</label>
        <input type="text" class="form-control" formControlName="content" placeholder="e.g. Electronics, Furniture" />
      </div>

      <div class="mb-3">
        <label class="form-label">Size</label>
        <select class="form-select" formControlName="size">
          <option value="">Select size</option>
          <option value="Small">Small</option>
          <option value="Medium">Medium</option>
          <option value="Large">Large</option>
        </select>
      </div>


      <button type="submit" class="btn btn-dark w-100">
        Add Cargo
      </button>

      <div class="mt-3" *ngIf="successMessage">
        <div class="alert alert-success">{{ successMessage }}</div>
      </div>
      <div class="mt-3" *ngIf="errorMessage">
        <div class="alert alert-danger">{{ errorMessage }}</div>
      </div>

    </form>
  </div>
</div>
